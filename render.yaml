services:
  - type: web
    name: ai-sniper-bybit-v5-mestre
    env: python
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: development
      - key: SQLITE_DB_PATH
        value: ./data/database.db
      - key: LATERAL_AMPLITUDE_PERIODS
        value: "20"
      - key: LATERAL_AMPLITUDE_PCT
        value: "0.35"
      - key: BLOCK_LATERAL_MARKETS
        value: "true"
    buildCommand: pip install -r requirements.txt && npm ci && npm run build
    startCommand: python -m gunicorn main_web:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --keep-alive 5
