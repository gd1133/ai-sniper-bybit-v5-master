<!DOCTYPE html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://cdn-icons-png.flaticon.com/512/2091/2091665.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duo-IA Master v13.0 -Supreme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #020617;
        color: #ffffff;
        overflow-x: hidden;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      #root { min-height: 100vh; }
      .scale-up { animation: scaleUp 0.4s ease-out forwards; }
      @keyframes scaleUp {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:2rem;color:#fff;background:#020617;font-family:system-ui">
        Ative o JavaScript para usar o painel do Motor Sniper.
        API: <a href="/api/status" style="color:#7dd3fc">/api/status</a>
      </div>
    </noscript>
    <script>
      // Evita tela preta eterna se o React não montar
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div style="max-width:640px;margin:3rem auto;padding:1.5rem;border:1px solid #334155;border-radius:1rem;background:#0f172a;color:#e2e8f0;font-family:system-ui">' +
            '<h2 style="color:#38bdf8">Painel não carregou</h2>' +
            '<p>O JS do dashboard falhou. A API do robô pode continuar ativa na Bybit.</p>' +
            '<p><a href="/api/status" style="color:#7dd3fc">Abrir /api/status</a> · ' +
            '<a href="javascript:location.reload()" style="color:#7dd3fc">Recarregar</a></p>' +
            '<pre id="diag" style="font-size:12px;overflow:auto;max-height:240px"></pre></div>';
          fetch('/api/status').then(function (r) { return r.json(); }).then(function (d) {
            var el = document.getElementById('diag');
            if (el) el.textContent = JSON.stringify(d, null, 2).slice(0, 1800);
          }).catch(function (e) {
            var el = document.getElementById('diag');
            if (el) el.textContent = String(e);
          });
        }
      }, 8000);
    </script>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
