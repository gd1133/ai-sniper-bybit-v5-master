[phases.setup]
nixPkgs = ["python311Full", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m pip install --upgrade pip --quiet",
  "python3 -m pip install -r requirements.txt",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "python3 -m gunicorn main_web:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
